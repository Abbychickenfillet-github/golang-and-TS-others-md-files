<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>call-apply-bind</title>
</head>
<body>
    <script>
        const person ={
            name: 'John',
            age: 20,
        }
        function greet(greeting, punctuation){
            console.log(`${greeting}, ${this.name}${punctuation}`)
        }
        greet.call(person, 'Hello', '!');
        //我看不懂的是greet.call明明用的是整個person物件，但是這邊的console.log印出的卻只有Hello, John! 而非整個物件我在想是不是因為

        //basic function scope and this 詞法
        //function scope可以關住var跟let/const
        //this詞法則是根據函數的調用方式來決定的
        //this的值在函數被定義的時候是無法確定的，只有在函數被調用的時候才能確定
        //this的值在函數被調用的時候是根據函數的調用方式來決定的
        //偷練習+測試：let, const, var, arrowfunction的function scope
        //let先
        const myLet = function(){
            let x = "let in function";
        }
        myLet();
        //為何這邊一定要執行？！！
        console.log(x); //會跑出x is not defined

        //將let宣告的直接把consolelog搬進去函式作用域裡面
        const myLet2 = function(){
            let x2 = "let x2 in function, use console.log in the function scope";
            console.log(x2);
        }
    </script>
</body>
</html>
