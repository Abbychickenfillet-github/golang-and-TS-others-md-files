<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="Noto Sans CJK SC, sans-serif">
  <rect x="0" y="0" width="820" height="360" fill="#ffffff"/>
  <text x="24" y="40" font-size="22" font-weight="700" fill="#1a1a2e">for...in vs Object.keys(obj)</text>
  <!-- header -->
  <rect x="24" y="60" width="240" height="46" fill="#1a1a2e"/>
  <rect x="264" y="60" width="270" height="46" fill="#1a1a2e"/>
  <rect x="534" y="60" width="262" height="46" fill="#1a1a2e"/>
  <text x="40" y="89" font-size="15" font-weight="700" fill="#ffffff">項目</text>
  <text x="280" y="89" font-size="15" font-weight="700" fill="#9ecbff">for...in</text>
  <text x="550" y="89" font-size="15" font-weight="700" fill="#9affc2">Object.keys(obj)</text>
  <!-- rows -->
  <g font-size="14" fill="#2b3a4a">
    <rect x="24" y="106" width="772" height="42" fill="#f6f8fb"/>
    <text x="40" y="133" font-weight="700">回傳值</text><text x="280" y="133">無(直接迴圈)</text><text x="550" y="133">鍵組成的「新陣列」</text>
    <rect x="24" y="148" width="772" height="42" fill="#ffffff"/>
    <text x="40" y="175" font-weight="700">含繼承屬性</text><text x="280" y="175" fill="#c2410c">會(走原型鏈)</text><text x="550" y="175" fill="#15803d">只自有</text>
    <rect x="24" y="190" width="772" height="42" fill="#f6f8fb"/>
    <text x="40" y="217" font-weight="700">含不可列舉</text><text x="280" y="217">不含</text><text x="550" y="217">不含</text>
    <rect x="24" y="232" width="772" height="42" fill="#ffffff"/>
    <text x="40" y="259" font-weight="700">順序</text><text x="280" y="259" fill="#c2410c">不保證</text><text x="550" y="259" fill="#15803d">明確且穩定</text>
    <rect x="24" y="274" width="772" height="48" fill="#f6f8fb"/>
    <text x="40" y="303" font-weight="700">建議用途</text><text x="280" y="303" fill="#c2410c">幾乎別用,別跑陣列</text><text x="550" y="303" fill="#15803d">安全遍歷物件自有屬性</text>
  </g>
  <rect x="24" y="60" width="772" height="262" fill="none" stroke="#d4dae2" stroke-width="1.5"/>
</svg>
